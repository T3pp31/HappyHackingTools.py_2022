name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: macos-latest
            target: macos
          - platform: windows-latest
            target: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libpcap-dev

      - name: Install macOS dependencies
        if: matrix.target == 'macos'
        run: |
          brew install libpcap

      - name: Install Windows dependencies
        if: matrix.target == 'windows'
        shell: powershell
        run: |
          $wpcapUrl = "https://www.winpcap.org/install/bin/WpdPack_4_1_2.zip"
          $zipPath = "$env:TEMP\WpdPack.zip"
          $extractPath = "$env:TEMP\WpdPack"
          Invoke-WebRequest -Uri $wpcapUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
          $libDir = "$extractPath\WpdPack\Lib\x64"
          echo "LIB=$libDir;$env:LIB" >> $env:GITHUB_ENV

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "HappyHackingTools ${{ github.ref_name }}"
          releaseBody: "Release ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
