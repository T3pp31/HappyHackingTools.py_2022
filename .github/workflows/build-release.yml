name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: macos-latest
            target: macos
          - platform: windows-latest
            target: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
            ./tools/windows-bootstrapper -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libpcap-dev

      - name: Install macOS dependencies
        if: matrix.target == 'macos'
        run: |
          brew install libpcap

      - name: Install Windows dependencies (Npcap SDK)
        if: matrix.target == 'windows'
        shell: powershell
        run: |
          $sdkUrl = "https://npcap.com/dist/npcap-sdk-1.13.zip"
          $zipPath = "$env:TEMP\npcap-sdk.zip"
          $extractPath = "C:\npcap-sdk"
          Invoke-WebRequest -Uri $sdkUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
          echo "LIB=$extractPath\Lib\x64" >> $env:GITHUB_ENV

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows bootstrapper
        if: matrix.target == 'windows'
        shell: powershell
        env:
          BOOTSTRAPPER_REPOSITORY_OWNER: ${{ github.repository_owner }}
          BOOTSTRAPPER_REPOSITORY_NAME: ${{ github.event.repository.name }}
          BOOTSTRAPPER_RELEASE_TAG: ${{ github.ref_name }}
        run: |
          cargo build --manifest-path tools/windows-bootstrapper/Cargo.toml --release
          Copy-Item `
            "tools/windows-bootstrapper\target\release\happyhackingtools-bootstrapper.exe" `
            "$env:RUNNER_TEMP\HappyHackingTools-bootstrapper.exe"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "HappyHackingTools ${{ github.ref_name }}"
          releaseBody: |
            Release ${{ github.ref_name }}

            Windows を利用する一般ユーザーは `HappyHackingTools-bootstrapper.exe` の利用を推奨します。
            Npcap は初回必須ではなく、Npcap 依存機能を使う際にアプリ内で案内します。
          releaseDraft: true
          prerelease: false

      - name: Upload Windows bootstrapper to release
        if: matrix.target == 'windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ runner.temp }}/HappyHackingTools-bootstrapper.exe
          fail_on_unmatched_files: true
